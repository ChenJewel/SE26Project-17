name: Android Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="${{ inputs.version }}"
          fi
          VERSION_NAME="${RELEASE_TAG#v}"
          CLEAN_VERSION="${VERSION_NAME%%[-+]*}"
          IFS='.' read -r VERSION_MAJOR VERSION_MINOR VERSION_PATCH <<< "${CLEAN_VERSION}"
          VERSION_CODE=$((10#${VERSION_MAJOR:-0} * 1000000 + 10#${VERSION_MINOR:-0} * 1000 + 10#${VERSION_PATCH:-0}))
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_ENV"
          echo "VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "APK_NAME=ueat-${RELEASE_TAG}.apk" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Check web
        working-directory: web
        run: npm run check

      - name: Build Capacitor web assets
        working-directory: web
        run: npm run app:build-web

      - name: Sync Android project
        working-directory: web
        run: npx cap sync android

      - name: Decode Android signing key
        working-directory: web/android/app
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is required for release signing." >&2
            exit 1
          fi
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > ueat-release.jks

      - name: Build signed release APK
        working-directory: web/android
        env:
          ANDROID_VERSION_CODE: ${{ env.VERSION_CODE }}
          ANDROID_VERSION_NAME: ${{ env.VERSION_NAME }}
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/web/android/app/ueat-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Prepare APK artifact
        shell: bash
        run: |
          mkdir -p release
          cp web/android/app/build/outputs/apk/release/app-release.apk "release/${APK_NAME}"
          sha256sum "release/${APK_NAME}" > "release/${APK_NAME}.sha256"
          APK_SHA256="$(cut -d ' ' -f 1 "release/${APK_NAME}.sha256")"
          APK_SIZE_BYTES="$(wc -c < "release/${APK_NAME}")"
          cat > release/app-version.json <<JSON
          {
            "versionCode": ${VERSION_CODE},
            "versionName": "${VERSION_NAME}",
            "minSupportedVersionCode": 1,
            "forceUpdate": false,
            "apkSha256": "${APK_SHA256}",
            "apkSizeBytes": ${APK_SIZE_BYTES},
            "releaseNotes": [
              "Android APK for ueat ${RELEASE_TAG}."
            ],
            "rolloutPercent": 100
          }
          JSON

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: |
            release/${{ env.APK_NAME }}
            release/${{ env.APK_NAME }}.sha256
            release/app-version.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: ueat ${{ env.RELEASE_TAG }}
          body: |
            Android APK for ueat ${{ env.RELEASE_TAG }}.

            Install note: download the APK on Android and allow installation from this source.
          files: |
            release/${{ env.APK_NAME }}
            release/${{ env.APK_NAME }}.sha256
            release/app-version.json
